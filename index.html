<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bonsai Fishtank</title>

    <!-- Head-coupled perspective illusion ("fishtank VR") driven by the
         front-facing webcam. MediaPipe Face Landmarker tracks the user's
         face in real time; we extract the 3D translation of the face
         relative to the webcam, map it into world space as the viewer's
         eye, then rebuild an off-axis (asymmetric) projection matrix
         each frame so the screen behaves as a window onto the scene
         instead of a fixed camera view. -->

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <style>
      :root { color-scheme: light dark; font-family: -apple-system, system-ui, sans-serif; }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0f14; color: #e8eef5; }

      #canvas { width: 100vw; height: 100vh; display: block; }
      #hud {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        padding: 10px 14px;
        background: rgba(10, 14, 22, 0.72);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-radius: 12px;
        font-size: 13px; line-height: 1.5;
        min-width: 220px;
      }
      #hud h1 { margin: 0 0 6px; font-size: 14px; font-weight: 600; }
      #hud .row { display: flex; justify-content: space-between; gap: 12px; }
      #hud code { color: #8cb3d9; }
      .btn {
        appearance: none; border: 0; border-radius: 8px;
        padding: 10px 14px; margin: 6px 4px 0 0;
        background: #2a6df4; color: #fff; font-size: 13px; font-weight: 500;
        cursor: pointer;
      }
      .btn:hover { filter: brightness(1.1); }
      .btn.secondary { background: #3a4352; }

      #preview {
        position: fixed; bottom: 12px; right: 12px; z-index: 10;
        width: 180px; height: 135px;
        border-radius: 8px; overflow: hidden;
        background: #000;
        border: 1px solid rgba(255,255,255,0.1);
      }
      #preview video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
      #preview .dot { position: absolute; top: 0; left: 0; width: 8px; height: 8px; border-radius: 50%; background: #7bff8c; box-shadow: 0 0 0 2px #000; pointer-events: none; }

      #build-stamp {
        position: fixed; bottom: 8px; left: 12px; z-index: 10;
        font-size: 10px; opacity: 0.5; font-family: ui-monospace, Menlo, monospace;
      }

      .slider-row { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-top: 6px; }
      .slider-row input { flex: 1; }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="hud">
      <h1>Bonsai Fishtank</h1>
      <div class="row"><span>FPS</span><code id="fps">—</code></div>
      <div class="row"><span>Face</span><code id="face-status">waiting for camera</code></div>
      <div class="row"><span>Eye (m)</span><code id="eye-pos">—</code></div>
      <div>
        <button id="start-btn" class="btn">Enable Camera</button>
        <button id="calibrate-btn" class="btn secondary" hidden>Recenter</button>
      </div>
      <div class="slider-row" id="camera-picker-row" hidden>
        <span>Camera</span>
        <select id="camera-picker" style="flex: 1; padding: 4px; border-radius: 6px; background: #1a2230; color: #e8eef5; border: 1px solid #3a4352;"></select>
      </div>
      <div class="slider-row">
        <span>Scale</span>
        <input id="scale" type="range" min="0.2" max="4" step="0.05" value="1">
        <code id="scale-val">1.00</code>
      </div>
      <div class="slider-row">
        <span>Screen W (cm)</span>
        <input id="screen-w" type="range" min="15" max="80" step="0.5" value="35.5">
        <code id="screen-w-val">35.5</code>
      </div>
      <div class="slider-row">
        <span>Sit-back (cm)</span>
        <input id="sit-back" type="range" min="20" max="120" step="1" value="61">
        <code id="sit-back-val">61</code>
      </div>
      <div class="slider-row">
        <span>Cam height</span>
        <input id="cam-h" type="range" min="-0.3" max="0.3" step="0.01" value="0">
        <code id="cam-h-val">0.00</code>
      </div>
      <div class="slider-row">
        <span>Cam pitch</span>
        <input id="cam-p" type="range" min="-45" max="45" step="1" value="0">
        <code id="cam-p-val">0°</code>
      </div>
      <div class="slider-row">
        <span>Scene X</span>
        <input id="scene-x" type="range" min="-0.5" max="0.5" step="0.01" value="0">
        <code id="scene-x-val">0.00</code>
      </div>
      <div class="slider-row">
        <span>Scene Y</span>
        <input id="scene-y" type="range" min="-0.5" max="0.5" step="0.01" value="0">
        <code id="scene-y-val">0.00</code>
      </div>
      <div class="slider-row">
        <span>Scene Z</span>
        <input id="scene-z" type="range" min="-1.0" max="0.2" step="0.01" value="-0.08">
        <code id="scene-z-val">-0.08</code>
      </div>
      <div class="slider-row">
        <span>Scene scale</span>
        <input id="scene-s" type="range" min="0.1" max="5" step="0.05" value="0.35">
        <code id="scene-s-val">0.35</code>
      </div>
      <div class="slider-row">
        <span>Box depth (cm)</span>
        <input id="box-d" type="range" min="5" max="40" step="0.5" value="15">
        <code id="box-d-val">15</code>
      </div>
    </div>

    <div id="preview">
      <video id="video" autoplay playsinline muted></video>
      <div class="dot" id="face-dot"></div>
    </div>

    <div id="build-stamp">Build 2026-04-14 box fix (TDZ)</div>

    <script type="module">
      import * as THREE from 'three';
      import { USDZLoader } from 'three/addons/loaders/USDZLoader.js';
      import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
      import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
      import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
      import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
      import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
      import { FilesetResolver, FaceLandmarker } from
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/vision_bundle.mjs';

      // -------------------- Scene --------------------
      const canvas = document.getElementById('canvas');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 0.95;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      const scene = new THREE.Scene();

      // -------------------- Screen geometry (declared early) --------------------
      // Defined here because rebuildWindowBox() further below references
      // it during initial scene construction. Originally lived next to
      // the off-axis projection block; the only thing that lived there
      // was its functionality, not its declaration.
      const screen = {
        widthMeters: 0.355,
        get heightMeters() {
          const aspect = window.innerHeight / window.innerWidth;
          return this.widthMeters * aspect;
        },
        pa() { return new THREE.Vector3(-this.widthMeters / 2, -this.heightMeters / 2, 0); },
        pb() { return new THREE.Vector3( this.widthMeters / 2, -this.heightMeters / 2, 0); },
        pc() { return new THREE.Vector3(-this.widthMeters / 2,  this.heightMeters / 2, 0); },
      };

      // Procedural sky gradient — a vertex-coloured inverted icosahedron
      // sitting at world distance ~5 m. Cheaper than a CubeRenderTarget
      // and gives us full control over the palette.
      function makeSky(top, bot) {
        const g = new THREE.IcosahedronGeometry(5, 2);
        const colors = new Float32Array(g.attributes.position.count * 3);
        const v = new THREE.Vector3();
        const cTop = new THREE.Color(top), cBot = new THREE.Color(bot);
        for (let i = 0; i < g.attributes.position.count; i++) {
          v.fromBufferAttribute(g.attributes.position, i).normalize();
          const t = THREE.MathUtils.smoothstep(v.y, -0.3, 0.6);
          const c = cBot.clone().lerp(cTop, t);
          colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
        }
        g.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const m = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide, depthWrite: false, fog: false });
        const mesh = new THREE.Mesh(g, m);
        mesh.frustumCulled = false;
        return mesh;
      }
      const sky = makeSky(0x6a89a8, 0x8a7458); // muted dawn / dusk haze
      scene.add(sky);

      // Image-based lighting from a generated room environment so PBR
      // materials have realistic specular reflections without us having
      // to ship an HDRI.
      const pmrem = new THREE.PMREMGenerator(renderer);
      scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

      // Subtle distance fog — gives the dust and god-rays something to
      // sit against and softens the back of the scene.
      scene.fog = new THREE.Fog(0xc7d4e2, 0.6, 3.5);

      // Off-axis camera — projection matrix is rebuilt each frame based on
      // the viewer's eye position relative to the screen rectangle.
      const camera = new THREE.PerspectiveCamera(60, 1, 0.01, 10);

      // Lighting — moody key + soft fill + warm rim, balanced for ACES.
      scene.add(new THREE.HemisphereLight(0xd8c8a8, 0x3a352a, 0.55));
      const sun = new THREE.DirectionalLight(0xffd7a0, 2.4);
      sun.position.set(-0.6, 1.2, 0.8);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      sun.shadow.camera.left = -0.5; sun.shadow.camera.right = 0.5;
      sun.shadow.camera.top = 0.5; sun.shadow.camera.bottom = -0.5;
      sun.shadow.camera.near = 0.1; sun.shadow.camera.far = 5;
      sun.shadow.bias = -0.0005;
      sun.shadow.normalBias = 0.02;
      scene.add(sun);

      const fill = new THREE.DirectionalLight(0x8aa6cc, 0.6);
      fill.position.set(0.8, 0.6, 0.4);
      scene.add(fill);

      const rim = new THREE.DirectionalLight(0xffd7a0, 0.8);
      rim.position.set(0.2, 0.8, -1.0);
      scene.add(rim);

      // Direction from world origin to the sun — used by the volumetric
      // shafts and dust glint shaders so the atmosphere lines up with the
      // key light. Ported from the AVP_AI_Experiments scene; sizes are
      // shrunk ~10× because this world is fishtank-scale (~0.3 m), not
      // room-scale (~4 m).
      const sunDir = sun.position.clone().normalize();

      // -------------------- God rays --------------------
      // Instanced additive slabs fanning from the sun, each modulated by
      // a value-noise shader so the shafts shimmer.
      const shaftMat = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        uniforms: {
          uTime: { value: 0 },
          uColor: { value: new THREE.Color(0xffe4a8) }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }`,
        fragmentShader: `
          varying vec2 vUv;
          uniform float uTime;
          uniform vec3 uColor;
          float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
          float vnoise(vec2 p) {
            vec2 i = floor(p); vec2 f = fract(p); f = f*f*(3.0-2.0*f);
            return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
                       mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
          }
          void main() {
            float n = vnoise(vec2(vUv.x * 3.0, vUv.y * 1.5 - uTime * 0.25));
            n = smoothstep(0.35, 1.0, n);
            float edge = smoothstep(0.0, 0.2, vUv.x) * smoothstep(0.0, 0.2, 1.0 - vUv.x);
            float fade = smoothstep(0.0, 0.25, vUv.y) * smoothstep(0.0, 0.4, 1.0 - vUv.y);
            float a = n * edge * fade * 0.55;
            gl_FragColor = vec4(uColor * 1.4, a);
          }`
      });

      const SHAFT_COUNT = 28;
      const shaftMesh = new THREE.InstancedMesh(
        new THREE.PlaneGeometry(0.04, 1.0),
        shaftMat,
        SHAFT_COUNT
      );
      shaftMesh.frustumCulled = false;
      {
        const dummy = new THREE.Object3D();
        const up = Math.abs(sunDir.y) > 0.9 ? new THREE.Vector3(1, 0, 0) : new THREE.Vector3(0, 1, 0);
        const perpA = new THREE.Vector3().crossVectors(sunDir, up).normalize();
        const perpB = new THREE.Vector3().crossVectors(sunDir, perpA).normalize();
        const sunPos = sunDir.clone().multiplyScalar(0.4);
        for (let i = 0; i < SHAFT_COUNT; i++) {
          const a = Math.random() * Math.PI * 2;
          const r = Math.random() * 0.16;
          dummy.position.copy(sunPos);
          dummy.position.add(perpA.clone().multiplyScalar(Math.cos(a) * r));
          dummy.position.add(perpB.clone().multiplyScalar(Math.sin(a) * r));
          dummy.position.add(sunDir.clone().multiplyScalar(-Math.random() * 0.25));
          dummy.lookAt(dummy.position.clone().add(sunDir));
          dummy.rotateZ(Math.random() * Math.PI);
          dummy.scale.set(0.3 + Math.random() * 0.4, 1.2 + Math.random() * 2.0, 1);
          dummy.updateMatrix();
          shaftMesh.setMatrixAt(i, dummy.matrix);
        }
        shaftMesh.instanceMatrix.needsUpdate = true;
      }
      // Parented to the diorama below so rays sit behind the window plane.

      // -------------------- Dust motes --------------------
      // Instanced billboarded quads with a soft circular falloff and a
      // view-aligned glint when the camera looks toward the sun.
      const DUST_COUNT = 420;
      const dustGeo = new THREE.PlaneGeometry(0.007, 0.007);
      const dustPhases = new Float32Array(DUST_COUNT);
      for (let i = 0; i < DUST_COUNT; i++) dustPhases[i] = Math.random();
      dustGeo.setAttribute('aPhase', new THREE.InstancedBufferAttribute(dustPhases, 1));

      const dustMat = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        uniforms: {
          uTime: { value: 0 },
          uSunDir: { value: sunDir }
        },
        vertexShader: `
          uniform float uTime;
          attribute float aPhase;
          varying vec2 vUv;
          varying vec3 vViewDir;
          void main() {
            vUv = uv;
            float t = uTime + aPhase * 6.283;
            vec3 bob = vec3(sin(t * 0.7) * 0.005, cos(t * 0.5) * 0.006, sin(t * 0.6) * 0.005);
            vec4 mv = instanceMatrix * vec4(0.0, 0.0, 0.0, 1.0);
            mv.xyz += bob;
            vec4 world = modelMatrix * mv;
            vViewDir = normalize(cameraPosition - world.xyz);
            vec4 mvPos = viewMatrix * world;
            mvPos.xy += position.xy;
            gl_Position = projectionMatrix * mvPos;
          }`,
        fragmentShader: `
          varying vec2 vUv;
          varying vec3 vViewDir;
          uniform vec3 uSunDir;
          void main() {
            vec2 d = vUv - vec2(0.5);
            float r = dot(d, d) * 4.0;
            float shape = smoothstep(1.0, 0.0, r);
            float glint = max(0.0, dot(vViewDir, -uSunDir));
            glint = pow(glint, 4.0);
            float a = shape * (0.18 + glint * 1.6);
            gl_FragColor = vec4(1.0, 0.94, 0.82, a);
          }`
      });

      const dustMesh = new THREE.InstancedMesh(dustGeo, dustMat, DUST_COUNT);
      dustMesh.frustumCulled = false;
      {
        const dummy = new THREE.Object3D();
        for (let i = 0; i < DUST_COUNT; i++) {
          const r = Math.pow(Math.random(), 0.55) * 0.4;
          const theta = Math.random() * Math.PI * 2;
          const y = -0.18 + Math.random() * 0.55;
          dummy.position.set(Math.cos(theta) * r, y, Math.sin(theta) * r);
          dummy.scale.setScalar(0.5 + Math.random() * 1.6);
          dummy.updateMatrix();
          dustMesh.setMatrixAt(i, dummy.matrix);
        }
        dustMesh.instanceMatrix.needsUpdate = true;
      }
      // Parented to the diorama below so motes float behind the window plane.

      // The diorama is parented to a single group so we can shove the
      // whole thing behind the screen plane in one go. Anything inside
      // sits ~8 cm "into" the window by default (≈ middle of the box).
      const diorama = new THREE.Group();
      diorama.position.set(0, 0, -0.08);
      diorama.scale.setScalar(0.35);
      scene.add(diorama);

      // -------------------- Window box (shoebox diorama) --------------------
      // An inverted BoxGeometry — the camera sits in front of the open
      // face and looks IN at the back-facing interior walls. Rebuilt
      // whenever the canvas aspect or screen-width slider changes so
      // the box always perfectly frames the visible viewport.
      const boxMat = new THREE.MeshStandardMaterial({
        color: 0x6e5a3f, roughness: 0.92, metalness: 0.0,
        side: THREE.BackSide
      });
      let boxDepth = 0.152;       // 6 inches
      let windowBox = null;
      function rebuildWindowBox() {
        if (windowBox) {
          scene.remove(windowBox);
          windowBox.geometry.dispose();
        }
        const w = screen.widthMeters;
        const h = screen.heightMeters;
        const g = new THREE.BoxGeometry(w, h, boxDepth);
        windowBox = new THREE.Mesh(g, boxMat);
        windowBox.position.set(0, 0, -boxDepth / 2);
        windowBox.receiveShadow = true;
        scene.add(windowBox);
      }
      rebuildWindowBox();

      // Ground / pedestal — the "floor of the fishtank"
      const pedestal = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.2, 0.04, 48),
        new THREE.MeshStandardMaterial({ color: 0x6b4a2c, roughness: 0.7, metalness: 0.05 })
      );
      pedestal.position.y = -0.18;
      pedestal.receiveShadow = true;
      pedestal.castShadow = true;
      diorama.add(pedestal);

      // (The huge circle floor was removed — the box bottom is now the
      // floor of the world.)

      // Bonsai placeholder — swapped out when ./bonsai.usdz loads.
      const bonsaiGroup = new THREE.Group();
      diorama.add(bonsaiGroup);
      buildPrimitiveBonsai(bonsaiGroup);

      // -------------------- Props --------------------
      // Moss tuft on the pedestal — flattened sphere with mossy green.
      const moss = new THREE.Mesh(
        new THREE.SphereGeometry(0.16, 24, 16),
        new THREE.MeshStandardMaterial({ color: 0x4f6b2e, roughness: 1.0 })
      );
      moss.scale.set(1, 0.18, 1);
      moss.position.y = -0.155;
      moss.receiveShadow = true;
      diorama.add(moss);

      // Scattered rocks — a fixed seed pattern so the layout is stable
      // between reloads. Slight color variance keeps them from looking
      // identical.
      function mulberry32(a) {
        return function () {
          let t = a += 0x6D2B79F5;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      const rng = mulberry32(0x42beef);
      const rockGeo = new THREE.IcosahedronGeometry(1, 0);
      for (let i = 0; i < 9; i++) {
        const tint = 0.55 + rng() * 0.25;
        const rock = new THREE.Mesh(
          rockGeo,
          new THREE.MeshStandardMaterial({
            color: new THREE.Color(tint, tint * 0.95, tint * 0.88),
            roughness: 0.9,
            flatShading: true
          })
        );
        const r = 0.22 + rng() * 0.35;
        const a = rng() * Math.PI * 2;
        rock.position.set(Math.cos(a) * r, -0.18, Math.sin(a) * r);
        rock.scale.set(0.025 + rng() * 0.04, 0.018 + rng() * 0.025, 0.025 + rng() * 0.04);
        rock.rotation.set(rng() * Math.PI, rng() * Math.PI, rng() * Math.PI);
        rock.castShadow = true;
        rock.receiveShadow = true;
        diorama.add(rock);
      }

      // A small ceramic dish under the bonsai — sits between the moss
      // and the pedestal lip so it reads as the pot rim.
      const dish = new THREE.Mesh(
        new THREE.TorusGeometry(0.17, 0.012, 12, 48),
        new THREE.MeshStandardMaterial({ color: 0xece2cf, roughness: 0.35, metalness: 0.1 })
      );
      dish.rotation.x = Math.PI / 2;
      dish.position.y = -0.158;
      dish.castShadow = true;
      dish.receiveShadow = true;
      diorama.add(dish);

      // -------------------- Drifting petals --------------------
      // Cherry-blossom-coloured instanced quads with a fall + sway
      // animation done entirely in the vertex shader. Each instance
      // wraps vertically so the system never depletes.
      const PETAL_COUNT = 90;
      const petalGeo = new THREE.PlaneGeometry(0.012, 0.012);
      const petalSeeds = new Float32Array(PETAL_COUNT);
      for (let i = 0; i < PETAL_COUNT; i++) petalSeeds[i] = Math.random();
      petalGeo.setAttribute('aSeed', new THREE.InstancedBufferAttribute(petalSeeds, 1));

      const petalMat = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        side: THREE.DoubleSide,
        uniforms: { uTime: { value: 0 } },
        vertexShader: `
          uniform float uTime;
          attribute float aSeed;
          varying vec2 vUv;
          varying float vTilt;
          void main() {
            vUv = uv;
            float t = uTime * 0.18 + aSeed * 6.283;
            // Wrap-around fall: petal Y decreases over time, modulo 0.7
            float fallY = mod(0.4 - t * 0.5, 0.7) - 0.18;
            float swayX = sin(t * 1.3 + aSeed * 9.0) * 0.05;
            float swayZ = cos(t * 0.9 + aSeed * 5.0) * 0.05;
            vec3 offset = vec3(swayX, fallY, swayZ);

            // Per-petal billboard tilt so they look like real flat petals
            // catching light at varied angles instead of facing the cam.
            float ang = aSeed * 6.283 + uTime * 0.4;
            mat3 tilt = mat3(
              cos(ang), 0.0, sin(ang),
              0.0, 1.0, 0.0,
              -sin(ang), 0.0, cos(ang)
            );
            vec3 pos = tilt * vec3(position.x, position.y, 0.0);
            vTilt = tilt[0].z;

            vec4 mv = instanceMatrix * vec4(0.0, 0.0, 0.0, 1.0);
            mv.xyz += offset;
            vec4 world = modelMatrix * mv;
            gl_Position = projectionMatrix * viewMatrix * (world + vec4(pos, 0.0));
          }`,
        fragmentShader: `
          varying vec2 vUv;
          varying float vTilt;
          void main() {
            vec2 d = vUv - vec2(0.5);
            // Petal-ish profile: longer than wide
            float r = d.x*d.x*4.0 + d.y*d.y*1.6;
            float a = smoothstep(1.0, 0.2, r);
            vec3 col = mix(vec3(1.0, 0.78, 0.85), vec3(1.0, 0.92, 0.96), 0.5 + 0.5 * vTilt);
            gl_FragColor = vec4(col, a * 0.85);
          }`
      });

      const petalMesh = new THREE.InstancedMesh(petalGeo, petalMat, PETAL_COUNT);
      petalMesh.frustumCulled = false;
      {
        const dummy = new THREE.Object3D();
        for (let i = 0; i < PETAL_COUNT; i++) {
          const r = Math.pow(rng(), 0.5) * 0.45;
          const a = rng() * Math.PI * 2;
          dummy.position.set(Math.cos(a) * r, rng() * 0.4, Math.sin(a) * r);
          dummy.updateMatrix();
          petalMesh.setMatrixAt(i, dummy.matrix);
        }
        petalMesh.instanceMatrix.needsUpdate = true;
      }
      diorama.add(petalMesh);

      // Now that the diorama exists, drop the atmospheric layers in.
      diorama.add(shaftMesh);
      diorama.add(dustMesh);

      function buildPrimitiveBonsai(parent) {
        parent.clear();
        const trunk = new THREE.Mesh(
          new THREE.CylinderGeometry(0.015, 0.025, 0.28, 12),
          new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.85 })
        );
        trunk.position.y = -0.04;
        trunk.castShadow = true; trunk.receiveShadow = true;
        parent.add(trunk);
        const branch = new THREE.Mesh(
          new THREE.CylinderGeometry(0.01, 0.015, 0.18, 10),
          new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.85 })
        );
        branch.position.set(0.055, 0.05, 0);
        branch.rotation.z = -Math.PI / 4;
        branch.castShadow = true; branch.receiveShadow = true;
        parent.add(branch);
        const canopy1 = new THREE.Mesh(
          new THREE.SphereGeometry(0.12, 24, 16),
          new THREE.MeshStandardMaterial({ color: 0x2e7d32, roughness: 0.8 })
        );
        canopy1.position.set(0, 0.16, 0); canopy1.scale.set(1, 0.6, 1);
        canopy1.castShadow = true; canopy1.receiveShadow = true;
        parent.add(canopy1);
        const canopy2 = new THREE.Mesh(
          new THREE.SphereGeometry(0.08, 24, 16),
          new THREE.MeshStandardMaterial({ color: 0x388e3c, roughness: 0.8 })
        );
        canopy2.position.set(0.1, 0.1, 0); canopy2.scale.set(1, 0.55, 1);
        canopy2.castShadow = true; canopy2.receiveShadow = true;
        parent.add(canopy2);
        const canopy3 = new THREE.Mesh(
          new THREE.SphereGeometry(0.07, 24, 16),
          new THREE.MeshStandardMaterial({ color: 0x2e7d32, roughness: 0.8 })
        );
        canopy3.position.set(-0.08, 0.08, -0.04); canopy3.scale.set(1, 0.55, 1);
        canopy3.castShadow = true; canopy3.receiveShadow = true;
        parent.add(canopy3);
      }

      // Load the bonsai USDZ. three.js's USDZLoader handles the Meshy-
      // authored UsdPreviewSurface path; complex MaterialX graphs would
      // need GLB instead.
      new USDZLoader().load(
        './bonsai-meshy.usdz',
        (usdz) => {
          // Compute bbox BEFORE adding to the scene so the parent
          // group's transform doesn't pollute the measurement.
          const box = new THREE.Box3().setFromObject(usdz);
          const size = box.getSize(new THREE.Vector3());
          const longest = Math.max(size.x, size.y, size.z);
          if (!isFinite(longest) || longest <= 0) {
            console.warn('[bonsai] usdz has empty bbox — keeping primitive fallback', size);
            return;
          }
          const scale = 0.3 / longest;
          usdz.scale.setScalar(scale);
          // Recentre using the *scaled* box so the pivot lands on the
          // tree, not in empty space.
          const rebox = new THREE.Box3().setFromObject(usdz);
          const c = rebox.getCenter(new THREE.Vector3());
          usdz.position.sub(c);

          // Defensive material fixes: Meshy assets sometimes ship with
          // single-sided geometry, transparent flags on opaque materials,
          // or alphaTest values that wipe out the canopy. Normalise so
          // the tree is guaranteed visible.
          usdz.traverse(o => {
            if (!o.isMesh) return;
            o.castShadow = true;
            o.receiveShadow = true;
            o.frustumCulled = false; // bbox occasionally lies on USDZ
            const mats = Array.isArray(o.material) ? o.material : [o.material];
            for (const m of mats) {
              if (!m) continue;
              m.side = THREE.DoubleSide;
              if (m.transparent && (m.opacity === undefined || m.opacity > 0.99)) {
                m.transparent = false;
                m.depthWrite = true;
              }
              if (m.alphaTest > 0.5) m.alphaTest = 0.1;
              m.needsUpdate = true;
            }
          });
          console.info('[bonsai] usdz loaded, bbox', size, 'scale', scale);

          bonsaiGroup.clear();
          bonsaiGroup.add(usdz);
        },
        undefined,
        (err) => console.warn('[bonsai] usdz load failed — using primitive fallback', err)
      );

      // -------------------- Off-axis projection (Kooima 2009) --------------------
      const _vr = new THREE.Vector3(), _vu = new THREE.Vector3(), _vn = new THREE.Vector3();
      const _va = new THREE.Vector3(), _vb = new THREE.Vector3(), _vc = new THREE.Vector3();
      function updateOffAxisCamera(eye) {
        const pa = screen.pa(), pb = screen.pb(), pc = screen.pc();
        _vr.copy(pb).sub(pa).normalize();
        _vu.copy(pc).sub(pa).normalize();
        _vn.crossVectors(_vr, _vu).normalize();

        _va.copy(pa).sub(eye);
        _vb.copy(pb).sub(eye);
        _vc.copy(pc).sub(eye);

        const d = -_va.dot(_vn);            // distance eye → screen plane
        const near = Math.max(0.05, d * 0.1);
        const far = 10;
        const s = near / d;
        const l = _vr.dot(_va) * s;
        const r = _vr.dot(_vb) * s;
        const b = _vu.dot(_va) * s;
        const t = _vu.dot(_vc) * s;

        camera.projectionMatrix.makePerspective(l, r, t, b, near, far);
        camera.projectionMatrixInverse.copy(camera.projectionMatrix).invert();

        camera.position.copy(eye);
        camera.up.set(0, 1, 0);
        camera.lookAt(0, 0, 0);
      }

      // -------------------- Face tracking --------------------
      const video = document.getElementById('video');
      const faceDot = document.getElementById('face-dot');
      const eyePosEl = document.getElementById('eye-pos');
      const faceStatusEl = document.getElementById('face-status');

      let faceLandmarker = null;
      let tracking = false;
      let lastVideoTime = -1;
      // Default eye sits 24" out, level with the canvas centre. The
      // tracker overwrites this every frame once enabled.
      const eye = new THREE.Vector3(0, 0, 0.61);
      let targetDepth = 0.61;          // calibration anchor in metres
      let eyeSmoothed = eye.clone();
      let calibrationOffset = new THREE.Vector3();

      // How to map MediaPipe's face translation units into world meters.
      // MediaPipe facial-transformation matrix translation is in cm for the
      // canonical metric face model, so 0.01 is the theoretical scale — but
      // webcam calibration varies wildly. A slider lets the user tune.
      let userScale = 1.0;

      function withTimeout(promise, ms, label) {
        return Promise.race([
          promise,
          new Promise((_, rej) => setTimeout(
            () => rej(new Error(`${label} timed out after ${ms} ms`)), ms
          ))
        ]);
      }

      async function startTracking() {
        // visionOS Safari doesn't expose getUserMedia for the headset's
        // cameras. Bail early with a useful message rather than hanging.
        if (/visionOS|AppleWebKit.*XR/i.test(navigator.userAgent)) {
          throw new Error('Vision Pro Safari does not expose webcam access. Open this page on a laptop or desktop with a camera.');
        }
        if (!navigator.mediaDevices?.getUserMedia) {
          throw new Error('getUserMedia not supported in this browser.');
        }

        // Request the camera FIRST so permission failures surface before
        // we pay the cost of downloading the MediaPipe model.
        faceStatusEl.textContent = 'accept camera prompt ↑';
        console.info('[fishtank] requesting getUserMedia — click allow in the browser\'s permission prompt');
        // Relaxed constraints: Chrome on Mac is notoriously slow when you
        // specify facingMode or exact resolutions. Let the browser pick
        // any camera, then we upgrade resolution and let the user swap
        // cameras via the picker.
        const stream = await withTimeout(
          navigator.mediaDevices.getUserMedia({ video: true, audio: false }),
          60000,
          'Camera permission (check the camera icon in the URL bar, and macOS System Settings → Privacy & Security → Camera → your browser)'
        );
        console.info('[fishtank] camera stream acquired');

        video.srcObject = stream;
        await withTimeout(
          new Promise((res) => { video.onloadedmetadata = res; }),
          5000,
          'Video metadata'
        );
        await video.play();

        faceStatusEl.textContent = 'loading model…';
        const vision = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/wasm'
        );
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
            delegate: 'GPU'
          },
          runningMode: 'VIDEO',
          numFaces: 1,
          outputFaceBlendshapes: false,
          outputFacialTransformationMatrixes: false
        });
        console.info('[fishtank] face landmarker ready');

        tracking = true;
        faceStatusEl.textContent = 'tracking';
        document.getElementById('calibrate-btn').hidden = false;
        populateCameraPicker();
      }

      // Once we have permission we can enumerate devices (labels are
      // only exposed after the user granted access). Populate a picker
      // so the user can switch cameras without reloading.
      async function populateCameraPicker() {
        try {
          const devices = await navigator.mediaDevices.enumerateDevices();
          const cams = devices.filter(d => d.kind === 'videoinput');
          if (cams.length < 2) return;
          const picker = document.getElementById('camera-picker');
          picker.innerHTML = '';
          for (const c of cams) {
            const opt = document.createElement('option');
            opt.value = c.deviceId;
            opt.textContent = c.label || `Camera ${picker.children.length + 1}`;
            picker.appendChild(opt);
          }
          // Set the current stream's device as selected.
          const currentTrack = video.srcObject?.getVideoTracks()[0];
          if (currentTrack) picker.value = currentTrack.getSettings().deviceId || cams[0].deviceId;
          document.getElementById('camera-picker-row').hidden = false;

          picker.addEventListener('change', async () => {
            const deviceId = picker.value;
            // Stop the old stream before starting a new one.
            video.srcObject?.getTracks().forEach(t => t.stop());
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { deviceId: { exact: deviceId } },
              audio: false
            });
            video.srcObject = stream;
            await video.play();
          });
        } catch (e) {
          console.warn('[fishtank] enumerateDevices failed', e);
        }
      }

      function tickFace() {
        if (!tracking || !faceLandmarker || video.readyState < 2) return;
        if (video.currentTime === lastVideoTime) return;
        lastVideoTime = video.currentTime;

        const result = faceLandmarker.detectForVideo(video, performance.now());
        const landmarks = result.faceLandmarks?.[0];
        if (!landmarks) { faceStatusEl.textContent = 'no face'; return; }
        faceStatusEl.textContent = 'tracking';

        // Iris centers are landmarks 468 (right) and 473 (left) when
        // Face Landmarker is configured with iris refinement (default).
        // Using them gives us the exact inter-pupillary midpoint, which
        // is where a viewer's "eye" effectively is for a fishtank-VR
        // illusion, and lets us derive depth geometrically from the
        // known inter-pupillary distance — no brittle matrix unit
        // conventions.
        const rIris = landmarks[468];
        const lIris = landmarks[473];
        if (!rIris || !lIris) { faceStatusEl.textContent = 'no iris'; return; }

        const mx = (rIris.x + lIris.x) / 2;
        const my = (rIris.y + lIris.y) / 2;

        const vw = video.videoWidth, vh = video.videoHeight;
        const dxPx = (rIris.x - lIris.x) * vw;
        const dyPx = (rIris.y - lIris.y) * vh;
        const irisPixelDist = Math.hypot(dxPx, dyPx);
        if (irisPixelDist < 4) return;

        // Pinhole model: from known real inter-pupillary distance and
        // observed pixel distance, recover metric depth.
        const realIPD = 0.063;              // meters, average adult IPD
        const assumedFovDeg = 60;           // typical laptop webcam HFOV
        const f_px = vw / (2 * Math.tan((assumedFovDeg / 2) * Math.PI / 180));
        const depth = realIPD * f_px / irisPixelDist;   // meters

        // Iris midpoint → camera-space coords. Webcam captures a non-
        // mirrored image, so moving your head right shows you moving
        // left in the frame. We negate X to put the eye on the correct
        // side of the world.
        //
        // Note: the f_px terms cancel out because depth itself scales
        // with f_px in exactly the inverse way, so camX and camY drop
        // out to a clean (mx-0.5) * vw * realIPD / irisPixelDist —
        // physically correct in METRES regardless of the assumed HFOV.
        // Only camZ depends on the HFOV guess, so userScale corrects
        // depth alone, not lateral.
        const camX = -((mx - 0.5) * vw) * realIPD / irisPixelDist;
        const camY = -((my - 0.5) * vh) * realIPD / irisPixelDist;
        const camZ = depth;

        // Webcam is assumed to sit directly above the screen at
        // (0, screen.heightMeters/2, 0) in world space.
        const wx = camX;
        const wy = screen.heightMeters / 2 + camY;
        const wz = camZ * userScale;

        eye.set(wx - calibrationOffset.x, wy - calibrationOffset.y, wz - calibrationOffset.z);

        // Preview dot on the (mirrored) webcam preview.
        // Preview is 180x135; dot is 8x8 so subtract 4 to center.
        faceDot.style.transform = `translate(${(1 - mx) * 180 - 4}px, ${my * 135 - 4}px)`;
        faceDot.style.display = 'block';
      }

      document.getElementById('calibrate-btn').addEventListener('click', () => {
        // Anchor "right now" as the natural pose: depth → targetDepth
        // (set by the Sit-back slider) via userScale on Z, and lateral
        // / vertical → 0 via the offsets. Lateral and vertical are
        // already in real metres so the offsets are just the current
        // raw values — no scale gymnastics.
        const camX = eye.x + calibrationOffset.x;
        const camY = eye.y - screen.heightMeters / 2 + calibrationOffset.y;
        const camZ = Math.max(0.05, (eye.z + calibrationOffset.z) / userScale);
        userScale = THREE.MathUtils.clamp(targetDepth / camZ, 0.2, 4);
        scaleInput.value = userScale.toFixed(2);
        scaleVal.textContent = userScale.toFixed(2);
        calibrationOffset.set(camX, camY, 0);
      });

      document.getElementById('start-btn').addEventListener('click', (ev) => {
        ev.currentTarget.disabled = true;
        startTracking().catch(err => {
          console.error('[fishtank]', err);
          // Shorten for the HUD, keep full message in console.
          const msg = err.name === 'NotAllowedError' ? 'camera permission denied'
                    : err.name === 'NotFoundError' ? 'no camera found'
                    : err.name === 'NotReadableError' ? 'camera in use by another app'
                    : err.message.length > 60 ? err.message.slice(0, 58) + '…'
                    : err.message;
          faceStatusEl.textContent = 'error: ' + msg;
          ev.currentTarget.disabled = false;
        });
      });

      // -------------------- UI wiring --------------------
      const scaleInput = document.getElementById('scale');
      const scaleVal = document.getElementById('scale-val');
      scaleInput.addEventListener('input', () => {
        userScale = parseFloat(scaleInput.value);
        scaleVal.textContent = userScale.toFixed(2);
      });

      const screenWInput = document.getElementById('screen-w');
      const screenWVal = document.getElementById('screen-w-val');
      screenWInput.addEventListener('input', () => {
        screen.widthMeters = parseFloat(screenWInput.value) / 100;
        screenWVal.textContent = screenWInput.value;
        rebuildWindowBox();
      });

      const boxDInput = document.getElementById('box-d');
      const boxDVal = document.getElementById('box-d-val');
      boxDInput.addEventListener('input', () => {
        boxDepth = parseFloat(boxDInput.value) / 100;
        boxDVal.textContent = boxDInput.value;
        rebuildWindowBox();
      });

      const sitBackInput = document.getElementById('sit-back');
      const sitBackVal = document.getElementById('sit-back-val');
      sitBackInput.addEventListener('input', () => {
        targetDepth = parseFloat(sitBackInput.value) / 100;
        sitBackVal.textContent = sitBackInput.value;
      });

      // Cam height = vertical offset added to the viewer eye. Positive
      // means the user is looking down at the bonsai from above; negative
      // means looking up at it from below. Off-axis projection stays
      // valid because the screen rect is unchanged — we just relocate
      // where the viewer is in front of it.
      let camHeight = 0;
      const camHInput = document.getElementById('cam-h');
      const camHVal = document.getElementById('cam-h-val');
      camHInput.addEventListener('input', () => {
        camHeight = parseFloat(camHInput.value);
        camHVal.textContent = camHeight.toFixed(2);
      });

      // Cam pitch = rotation of the *diorama* around X. Tilting the
      // world is more well-defined than tilting the off-axis camera (the
      // camera always has to face the screen plane for the projection to
      // make sense), and visually it does the same job — you see the top
      // of the canopy at positive pitch, the underside at negative.
      let camPitchDeg = 0;
      const camPInput = document.getElementById('cam-p');
      const camPVal = document.getElementById('cam-p-val');
      camPInput.addEventListener('input', () => {
        camPitchDeg = parseFloat(camPInput.value);
        camPVal.textContent = `${camPitchDeg | 0}°`;
        diorama.rotation.x = THREE.MathUtils.degToRad(camPitchDeg);
      });

      // Scene X/Y/Z sliders move the diorama group as a whole — same
      // pivot as Cam Pitch, so framing controls are coherent. Z range
      // straddles the screen plane (z=0): negative = behind the window,
      // positive = poking out toward the viewer.
      const sceneAxes = [
        { axis: 'x', input: 'scene-x', val: 'scene-x-val', initial: 0 },
        { axis: 'y', input: 'scene-y', val: 'scene-y-val', initial: 0 },
        { axis: 'z', input: 'scene-z', val: 'scene-z-val', initial: -0.08 },
      ];
      for (const cfg of sceneAxes) {
        diorama.position[cfg.axis] = cfg.initial;
        const el = document.getElementById(cfg.input);
        const valEl = document.getElementById(cfg.val);
        el.addEventListener('input', () => {
          const v = parseFloat(el.value);
          diorama.position[cfg.axis] = v;
          valEl.textContent = v.toFixed(2);
        });
      }

      const sceneSInput = document.getElementById('scene-s');
      const sceneSVal = document.getElementById('scene-s-val');
      sceneSInput.addEventListener('input', () => {
        const v = parseFloat(sceneSInput.value);
        diorama.scale.setScalar(v);
        sceneSVal.textContent = v.toFixed(2);
      });

      // -------------------- Post-processing --------------------
      // EffectComposer pipeline so future effects (DOF, SSR, vignette) can
      // slot in as additional passes without touching the main loop.
      // Bloom gives the god-rays and dust a soft glow that sells them as
      // light, not just translucent quads.
      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        0.45,  // strength
        0.7,   // radius
        0.9    // threshold — only the brightest pixels (sun, glints) bloom
      );
      composer.addPass(bloomPass);
      composer.addPass(new OutputPass());

      // -------------------- Resize --------------------
      function resize() {
        const w = window.innerWidth, h = window.innerHeight;
        renderer.setSize(w, h, false);
        composer.setSize(w, h);
        canvas.width = w * renderer.getPixelRatio();
        canvas.height = h * renderer.getPixelRatio();
        rebuildWindowBox(); // screen.heightMeters depends on aspect
      }
      window.addEventListener('resize', resize);
      resize();

      // -------------------- Main loop --------------------
      const fpsEl = document.getElementById('fps');
      let frames = 0, fpsT0 = performance.now();
      const clock = new THREE.Clock();

      const _eyeWithOffsets = new THREE.Vector3();
      function animate() {
        tickFace();
        // Low-pass filter the eye so micro-jitter in face tracking doesn't
        // turn into visible judder on the tree.
        eyeSmoothed.lerp(eye, 0.35);
        // Apply the manual height offset on top of the tracked eye —
        // sliders are framing controls, tracking is parallax.
        _eyeWithOffsets.copy(eyeSmoothed);
        _eyeWithOffsets.y += camHeight;
        updateOffAxisCamera(_eyeWithOffsets);

        const dt = clock.getDelta();
        shaftMat.uniforms.uTime.value += dt;
        dustMat.uniforms.uTime.value += dt;
        petalMat.uniforms.uTime.value += dt;

        composer.render();

        frames++;
        const now = performance.now();
        if (now - fpsT0 > 500) {
          fpsEl.textContent = (frames * 1000 / (now - fpsT0)).toFixed(0);
          eyePosEl.textContent = `${eyeSmoothed.x.toFixed(2)}, ${eyeSmoothed.y.toFixed(2)}, ${eyeSmoothed.z.toFixed(2)}`;
          frames = 0; fpsT0 = now;
        }
        requestAnimationFrame(animate);
      }
      animate();
    </script>
  </body>
</html>
